services:
  env-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  webfrontend:
    image: "${WEBFRONTEND_IMAGE}"
    environment:
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    ports:
      - "5000:8080"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
